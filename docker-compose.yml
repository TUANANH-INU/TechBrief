version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: techbrief_db
    environment:
      POSTGRES_DB: ${DB_NAME:-techbrief_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techbrief_network

  ollama:
    image: ollama/ollama:latest
    container_name: techbrief_ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./data/ollama_data:/root/.ollama
    networks:
      - techbrief_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techbrief_backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-techbrief_db}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - techbrief_network

volumes:
  postgres_data:
  ollama_data:

networks:
  techbrief_network:
    driver: bridge
