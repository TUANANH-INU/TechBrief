name: CI Pipeline

on:
  pull_request: 
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main 

permissions:
  contents: write 
  id-token: write
  pull-requests: read 

jobs:
  # =============================
  # CI
  # =============================
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Run build
        run: |
          pip uninstall typing -y
          make build

  # =============================
  # Check release
  # =============================
  check-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      labels: ${{ steps.labels.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get PR labels
        id: labels
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number')
          labels=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json labels -q '.labels[].name' | tr '\n' ' ')
          echo "labels=$labels" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release is needed
        id: check
        run: |
          labels="${{ steps.labels.outputs.labels }}"
          if [[ $labels == *"major"* || $labels == *"minor"* || $labels == *"patch"* ]]; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

  # =============================
  # Release
  # =============================
  release:
    needs: check-release
    if: needs.check-release.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Checkout full history & tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          fetch-tags: true 

      - name: Get current version
        id: version
        run: |
          git fetch --tags --force
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current version: $VERSION"
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          current="${{ steps.version.outputs.current }}"
          labels="${{ needs.check-release.outputs.labels }}"

          major=$(echo $current | cut -d. -f1 | tr -d v)
          minor=$(echo $current | cut -d. -f2)
          patch=$(echo $current | cut -d. -f3)

          if [[ $labels == *"major"* ]]; then
            major=$((major+1)); minor=0; patch=0
            echo "Bumping MAJOR version"
          elif [[ $labels == *"minor"* ]]; then
            minor=$((minor+1)); patch=0
            echo "Bumping MINOR version"
          else
            patch=$((patch+1))
            echo "Bumping PATCH version"
          fi

          new="v$major.$minor.$patch"
          echo "New version: $new"
          echo "new=$new" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new }}
          name: Release ${{ steps.bump.outputs.new }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
